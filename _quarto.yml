project:
  type: website
  resources:
    - assets/**
    - .nojekyll

website:
  title: "Oda World"
  description: "Technology, innovation, and ideas across borders."
  site-url: https://codetricity.github.io
  favicon: assets/favicon.ico
  image: assets/logo-square.png
  navbar:
    background: light
    foreground: dark
    logo-alt: "Oda World"
    title: false
    left:
      - href: index.qmd
        text: Home
      - href: about.qmd
        text: About
    right:
      - icon: rss
        href: index.xml
      - icon: github
        href: https://github.com/codetricity
  page-footer:
    center: "© 2026 Oda World"

format:
  html:
    theme:
      - cosmo
      - brand
    css: styles.css
    toc: true
    smooth-scroll: true
    highlight-style: github
